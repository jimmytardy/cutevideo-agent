version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cutevideo
      POSTGRES_USER: cutevideo
      POSTGRES_PASSWORD: cutevideo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cutevideo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
