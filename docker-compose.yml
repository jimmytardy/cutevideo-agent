name: cuteagent-video

networks:
  # Docker crée ce réseau en local s'il n'existe pas.
  # Sur le VPS, il réutilisera le réseau existant.
  local-network:
    driver: bridge
    name: local-network

services:
  app:
    container_name: cuteagent-video
    image: cuteagent-video:local
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cutevideo:cutevideo@shared-postgres:5432/cutevideo
      REDIS_URL: redis://redis:6379
      # L'API uvicorn tourne dans le même conteneur (voir docker-entrypoint.sh),
      # donc le proxy Next.js doit viser localhost, pas l'hôte.
      INTERNAL_API_URL: http://127.0.0.1:8000
    ports:
      - "${APP_HOST:-127.0.0.1}:${PORT:-3000}:3000"
    volumes:
      - app_tmp:/app/tmp
      - app_output:/app/output
    networks:
      - local-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  worker:
    container_name: cuteagent-video-worker
    image: cuteagent-video:local
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cutevideo:cutevideo@shared-postgres:5432/cutevideo
      REDIS_URL: redis://redis:6379
    volumes:
      - app_tmp:/app/tmp
      - app_output:/app/output
    networks:
      - local-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["./scripts/docker-entrypoint.worker.dev.sh"]
    restart: unless-stopped
    depends_on:
      shared-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  app-dev:
    container_name: cuteagent-video-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cutevideo:cutevideo@shared-postgres:5432/cutevideo
      REDIS_URL: redis://redis:6379
      # L'API uvicorn tourne dans le même conteneur (voir docker-entrypoint.dev.sh),
      # donc le proxy Next.js doit viser localhost, pas l'hôte.
      INTERNAL_API_URL: http://127.0.0.1:8000
      SCHEDULER_ENABLED: "false"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./agent:/app/agent
      - ./api:/app/api
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./dashboard:/app/dashboard
      - /app/dashboard/node_modules
      - /app/dashboard/.next
      - app_tmp:/app/tmp
      - app_output:/app/output
    networks:
      - local-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      shared-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker-dev:
        condition: service_started

  worker-dev:
    container_name: cuteagent-video-worker-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cutevideo:cutevideo@shared-postgres:5432/cutevideo
      REDIS_URL: redis://redis:6379
      SCHEDULER_ENABLED: "false"
    volumes:
      - ./agent:/app/agent
      - ./api:/app/api
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./data:/app/data
      - ./scripts:/app/scripts
      - app_tmp:/app/tmp
      - app_output:/app/output
    networks:
      - local-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["./scripts/docker-entrypoint.worker.dev.sh"]
    depends_on:
      shared-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Ce bloc reste en sommeil, sauf si app-dev le réveille
  shared-postgres:
    container_name: shared-postgres
    image: postgres:16
    environment:
      POSTGRES_DB: cutevideo
      POSTGRES_USER: cutevideo
      POSTGRES_PASSWORD: cutevideo
    ports:
      - "5432" # 🟢 CHANGEMENT ICI : On retire le "5433:" devant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - local-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cutevideo -d cutevideo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: redis
    image: redis:7-alpine
    ports:
      - "6379" # 🟢 CHANGEMENT ICI : On retire le "6380:" devant
    networks:
      - local-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  app_tmp:
  app_output: